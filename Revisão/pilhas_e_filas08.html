<!DOCTYPE html>
<html lang="en">
<head>
    <script>

    let dados = [10, 20, 30, 40];
    let valor = 25;
    let posicao = 2;

    console.log(dados);
    dados.push(0); // abre uma posicao no final

    console.log(dados);
    for (let i = dados.length - 1; i > posicao; i--) {
        dados[i] = dados[i - 1];
        console.log("Vetor depois da " + (dados.length-i) + " passagem = " + dados);
    }
    dados[posicao] = valor
    console.log(dados);
    </script>
</head>

</html>
