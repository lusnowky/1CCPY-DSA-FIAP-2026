    <script>
        
    let dados = [10, 20, 30, 40, 50];
    let posicao = 1;

    console.log(dados);
    let c = 1
    for (let i = posicao; i < dados.length - 1; i++) {
        dados[i] = dados[i + 1];
        console.log("Vetor depois da " + c + "ª passagem = " + dados);
        c++;
    }
    
    dados.pop();

    console.log(dados);
    
    </script>
